<svg xmlns="http://www.w3.org/2000/svg" width="675" height="1125" viewBox="0 0 675 1125" font-family="Arial, Helvetica, sans-serif">
  <!-- VERTICAL · 2in x 3.5in @300dpi + 0.125in bleed (trim = inner 600x1050). -->
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#db2777"/><stop offset="0.5" stop-color="#fb7185"/><stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#fb7185" stop-opacity="0.5"/><stop offset="1" stop-color="#fb7185" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#14b8a6" stop-opacity="0.42"/><stop offset="1" stop-color="#14b8a6" stop-opacity="0"/></radialGradient>
  </defs>

  <rect width="675" height="1125" fill="#131316"/>
  <circle cx="640" cy="130" r="380" fill="url(#g1)"/>
  <circle cx="40" cy="1040" r="340" fill="url(#g2)"/>
  <!-- sparkle signature -->
  <g transform="translate(330,60) scale(26)" opacity="0.10"><path fill="url(#brand)" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></g>
  <g transform="translate(470,470) scale(1.9)" opacity="0.7"><path fill="#2dd4bf" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></g>

  <!-- spine (bleeds off left edge) -->
  <rect x="0" y="0" width="16" height="1125" fill="url(#brand)"/>

  <!-- brand mark -->
  <rect x="58" y="80" width="100" height="100" rx="24" fill="url(#brand)"/>
  <text x="108" y="153" font-size="66" font-weight="700" fill="#ffffff" text-anchor="middle">M</text>
  <text x="182" y="118" font-size="22" letter-spacing="6" fill="#9ca3af">ASK</text>
  <text x="182" y="164" font-size="44" font-weight="700" fill="#ffffff">MIKE<tspan fill="#2dd4bf">AI</tspan></text>

  <!-- name block -->
  <rect x="60" y="552" width="86" height="10" rx="5" fill="url(#brand)"/>
  <text x="58" y="652" font-size="84" font-weight="800" letter-spacing="-1" fill="#ffffff">Michael</text>
  <text x="58" y="742" font-size="84" font-weight="800" letter-spacing="-1" fill="#ffffff">Friedberg</text>
  <text x="60" y="800" font-size="36" font-weight="800" fill="#2dd4bf">Pain Point Finder</text>
  <text x="60" y="848" font-size="28" fill="#9ca3af">Principal Software Engineer</text>
  <text x="60" y="884" font-size="28" fill="#9ca3af">AI builder &amp; educator</text>
  <text x="60" y="956" font-size="29" font-weight="700" fill="url(#brand)">AI software that solves real problems</text>
  <text x="60" y="1058" font-size="29" fill="#6b7280">askmikeai.com</text>
</svg>
